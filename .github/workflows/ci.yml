name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python tooling and API package
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"

      - name: Python lint and typecheck
        run: |
          python -m ruff check apps/api/src apps/api/tests
          python -m mypy --config-file apps/api/pyproject.toml apps/api/src

      - name: Python tests
        run: python -m pytest apps/api/tests -q

      - name: Install Node dependencies
        run: |
          npm install
          npm run install:all

      - name: Frontend lint and build
        run: |
          npm run lint --prefix apps/web
          npm run build --prefix apps/web
